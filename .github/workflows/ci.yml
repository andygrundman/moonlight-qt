---
name: CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  push:
    branches: [andyg.github-actions-ci] # XXX

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  github_env:
    name: GitHub Env Debug
    runs-on: ubuntu-latest

    steps:
      - name: Dump GitHub context
        run: echo "$GITHUB_CONTEXT"
        shell: bash
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}

  build_win:
    name: Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt x64
        uses: jurplel/install-qt-action@v4
        with:
          arch: win64_msvc2022_64
          dir: ${{ github.workspace }}\x64\
          host: windows
          setup-python: false
          target: desktop
          version: '6.8.*'

      - name: Build metadata
        run: |
          echo ("GIT_SHORT_SHA=" + (git rev-parse --short $env:GITHUB_SHA)) >> $env:GITHUB_ENV
          echo ("GIT_BRANCH=" + $env:GITHUB_REF.replace('refs/heads/', '')) >> $env:GITHUB_ENV
          echo ("VERSION=" + (Get-Content app/version.txt)) >> $env:GITHUB_ENV

      - name: Build Windows x64
        shell: pwsh
        run: |
          $env:PATH = "$($env:PATH);$($env:QT_ROOT_DIR)\msvc2022_64\bin"
          echo "PATH=$($env:PATH)"
          scripts\build-arch.bat Release
          mkdir artifacts
          Get-ChildItem -Path "build\" -Recurse
          # echo ("Copy-Item -Path build\installer-x64-release\MoonlightPortable-x64-$($env:VERSION).zip -Destination artifacts\MoonlightPortable-x64-$($env:VERSION)-$($env:GIT_BRANCH)-$($env:GIT_SHORT_SHA).zip")
          # Copy-Item -Path "build\installer-x64-release\MoonlightPortable-x64-$($env:VERSION).zip" -Destination "artifacts\MoonlightPortable-x64-$($env:VERSION)-$($env:GIT_BRANCH)-$($env:GIT_SHORT_SHA).zip"

      - name: Install Qt arm64
        uses: jurplel/install-qt-action@v4
        with:
          arch: win64_msvc2022_arm64_cross_compiled
          dir: ${{ github.workspace }}\arm64\
          host: windows
          setup-python: false
          target: desktop
          version: '6.8.*'

      - name: Build Windows arm64
        shell: pwsh
        run: |
          Copy-Item "scripts\appveyor\qmake.bat" -Destination "$($env:QT_ROOT_DIR)\msvc2022_arm64\bin\"
          Copy-Item "scripts\appveyor\qtpaths.bat" -Destination "$($env:QT_ROOT_DIR)\msvc2022_arm64\bin\"
          Copy-Item "scripts\appveyor\target_qt.conf -Destination "$($env:QT_ROOT_DIR)\msvc2022_arm64\bin\"
          $env:PATH = "$($env:PATH);$($env:QT_ROOT_DIR)\msvc2022_arm64\bin"
          echo "PATH=$($env:PATH)"
          scripts\build-arch.bat Release
          # mkdir artifacts
          Get-ChildItem -Path "build\" -Recurse
          # echo ("Copy-Item build\installer-x64-release\MoonlightPortable-x64-$($env:VERSION).zip -Destination artifacts\MoonlightPortable-x64-$($env:VERSION)-$($env:GIT_BRANCH)-$($env:GIT_SHORT_SHA).zip")
          # Copy-Item "build\installer-x64-release\MoonlightPortable-x64-$($env:VERSION).zip" -Destination "artifacts\MoonlightPortable-x64-$($env:VERSION)-$($env:GIT_BRANCH)-$($env:GIT_SHORT_SHA).zip"
          # -- Build universal binary bundle
          # scripts\generate-bundle.bat Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-windows
          path: artifacts/
